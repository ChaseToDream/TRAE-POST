name: Update Forum Posts

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch forum posts
        env:
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
        run: python scripts/fetch_posts.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --exit-code data/posts.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "chore: update forum posts $(date +%Y-%m-%d)"
          git push
